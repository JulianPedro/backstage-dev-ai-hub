name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type check · Test · Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint:all

      - name: Type check
        run: |
          for dir in plugins/dev-ai-hub-common plugins/dev-ai-hub-node plugins/dev-ai-hub-backend plugins/dev-ai-hub; do
            pkg=$(node -p "require('./$dir/package.json').name")
            echo "Type checking $pkg..."
            yarn workspace "$pkg" tsc
          done

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build:all

